<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supa Coffee - Франшиза</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="header">
    <div class="container">
      <div class="header__logo">
        <span class="logo-text">Supa Coffee</span>
      </div>
      <nav class="header__nav">
        <a href="#advantages" class="nav__link">Преимущества</a>
        <a href="#formats" class="nav__link">Форматы</a>
        <a href="#contact" class="nav__link nav__link--button">Оставить заявку</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container hero__container">
        <div class="hero__content">
          <h1 class="hero__title">Франшиза кофейни<br>Supa Coffee</h1>
          <p class="hero__subtitle">Успешный бизнес с минимальными<br>инвестициями и рисками</p>
          <div class="hero__stats">
            <div class="hero__stat">
              <span class="hero__stat-label">Роялти</span>
              <span class="hero__stat-value">8%</span>
            </div>
            <div class="hero__stat">
              <span class="hero__stat-label">Кофеен</span>
              <span class="hero__stat-value">65+</span>
            </div>
            <div class="hero__stat">
              <span class="hero__stat-label">Инвестиции от</span>
              <span class="hero__stat-value">500 000</span>
            </div>
          </div>
        </div>
        <div class="hero__image">
          <img src="https://images.unsplash.com/photo-1501339847302-ac426a4a7cbb?w=800&q=80" alt="Интерьер кофейни Supa Coffee">
        </div>
      </div>
    </section>
  </main>
</body>
</html>
